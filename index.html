<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Scroll PDF</title>
    <style>
      body {
        margin: 0;
        background: #f5f5f5;
      }
      img {
        display: block;
        width: 100%;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Replace with your exported PDF page images -->
    <img src="page1.jpg" alt="Page 1" />
    <img src="page2.jpg" alt="Page 2" />
    <!-- <img src="page3.png" alt="Page 3"> -->

    <script>
      function autoScroll(speed) {
        setInterval(() => {
          window.scrollBy(0, speed)
        }, 50) // speed in px per 50ms
      }
      autoScroll(1)
    </script>
  </body>
</html>
